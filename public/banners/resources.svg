<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="">
  <defs>
    <radialGradient id="rg1" cx="80%" cy="75%" r="80%">
      <stop offset="0%" stop-color="#1E3A5F" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0F1B2D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    .pulse{stroke-dasharray:16 484;stroke-linecap:round;animation:flow 13s linear infinite}
    .p2{animation-duration:15s;animation-delay:-8s}
    @keyframes flow{to{stroke-dashoffset:-500}}
    @media (prefers-reduced-motion:reduce){.pulse{display:none}}
  </style>
  <rect width="1600" height="900" fill="#0F1B2D"/>
  <rect width="1600" height="900" fill="url(#rg1)"/>
  <!-- library: staggered spines on shelves -->
  <g stroke="#3D6491" stroke-width="2" opacity="0.55" fill="none">
    <path d="M900 660 H1520"/>
    <path d="M900 420 H1520"/>
  </g>
  <!-- knowledge moving along the shelves -->
  <g stroke="#8FB3DE" stroke-width="2" opacity="0.35" fill="none">
    <path class="pulse" d="M900 660 H1520"/>
    <path class="pulse p2" d="M900 420 H1520"/>
  </g>
  <g fill="#3D6491" opacity="0.5">
    <rect x="930" y="480" width="26" height="180" rx="3"/>
    <rect x="968" y="510" width="20" height="150" rx="3"/>
    <rect x="1000" y="465" width="30" height="195" rx="3"/>
    <rect x="1042" y="500" width="22" height="160" rx="3"/>
    <rect x="1150" y="475" width="26" height="185" rx="3"/>
    <rect x="1188" y="512" width="20" height="148" rx="3"/>
    <rect x="1220" y="490" width="28" height="170" rx="3"/>
    <rect x="1330" y="470" width="24" height="190" rx="3"/>
    <rect x="1366" y="505" width="20" height="155" rx="3"/>
    <rect x="1398" y="485" width="28" height="175" rx="3"/>
  </g>
  <rect x="1076" y="488" width="24" height="172" rx="3" fill="#E0A951" opacity="0.8"/>
  <rect x="1260" y="502" width="22" height="158" rx="3" fill="#E0A951" opacity="0.45"/>
  <g fill="#3D6491" opacity="0.35">
    <rect x="930" y="240" width="26" height="180" rx="3"/>
    <rect x="968" y="270" width="20" height="150" rx="3"/>
    <rect x="1000" y="225" width="30" height="195" rx="3"/>
    <rect x="1110" y="255" width="24" height="165" rx="3"/>
    <rect x="1146" y="235" width="28" height="185" rx="3"/>
  </g>
</svg>
